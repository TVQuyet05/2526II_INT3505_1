<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Client-Server Demo</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        text-align: center;
        max-width: 500px;
        width: 90%;
      }
      h1 {
        color: #333;
        margin-bottom: 10px;
      }
      .subtitle {
        color: #666;
        margin-bottom: 30px;
        font-size: 14px;
      }
      .btn {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        padding: 15px 30px;
        font-size: 16px;
        border-radius: 30px;
        cursor: pointer;
        margin: 10px;
        transition:
          transform 0.3s,
          box-shadow 0.3s;
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
      }
      .btn:active {
        transform: translateY(0);
      }
      .result-box {
        margin-top: 30px;
        padding: 20px;
        background: #f8f9fa;
        border-radius: 10px;
        border-left: 4px solid #667eea;
        text-align: left;
        min-height: 80px;
      }
      .result-box h3 {
        color: #667eea;
        margin-bottom: 10px;
        font-size: 14px;
      }
      .result-box pre {
        background: #2d2d2d;
        color: #f8f8f2;
        padding: 15px;
        border-radius: 8px;
        overflow-x: auto;
        font-size: 13px;
      }
      .loading {
        color: #999;
        font-style: italic;
      }
      .diagram {
        margin: 20px 0;
        padding: 15px;
        background: #e8f4f8;
        border-radius: 10px;
        font-family: monospace;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🖥️ Client-Server Demo</h1>
      <p class="subtitle">Kiến trúc REST API cơ bản</p>

      <div class="diagram">
        <strong>Client (Browser)</strong> ←→ <strong>Server (Flask)</strong
        ><br />
        Request → | ← Response (JSON)
      </div>

      <div class="buttons">
        <button class="btn" onclick="sayHello()">👋 Gọi API Hello</button>
        <button class="btn" onclick="getTime()">⏰ Lấy Thời Gian</button>
      </div>

      <div class="result-box">
        <h3>📦 Response từ Server:</h3>
        <pre
          id="result"
        ><span class="loading">Nhấn nút để gửi request...</span></pre>
      </div>
    </div>

    <script>
      const resultBox = document.getElementById("result");

      // Hàm gọi API /api/hello
      async function sayHello() {
        resultBox.innerHTML =
          '<span class="loading">Đang gửi request...</span>';

        try {
          const response = await fetch("/api/hello");
          const data = await response.json();

          resultBox.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          resultBox.textContent = "Lỗi: " + error.message;
        }
      }

      // Hàm gọi API /api/time
      async function getTime() {
        resultBox.innerHTML =
          '<span class="loading">Đang gửi request...</span>';

        try {
          const response = await fetch("/api/time");
          const data = await response.json();

          resultBox.textContent = JSON.stringify(data, null, 2);
        } catch (error) {
          resultBox.textContent = "Lỗi: " + error.message;
        }
      }
    </script>
  </body>
</html>
