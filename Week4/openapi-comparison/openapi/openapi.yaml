openapi: 3.0.3
info:
  title: Simple Books API
  version: 1.0.0
  description: Simple Books Management API with Flask.
servers:
  - url: http://localhost:5000
    description: Local development server

tags:
  - name: Books
    description: Book catalog operations
paths:
  /books:
    get:
      tags:
        - Books
      summary: List books
      responses:
        "200":
          description: A list of books.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Book"
    post:
      tags:
        - Books
      summary: Create a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBook"
      responses:
        "201":
          description: Book created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
  /books/{id}:
    parameters:
      - $ref: "#/components/parameters/BookId"
    get:
      tags:
        - Books
      summary: Get a book by ID
      responses:
        "200":
          description: Book details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found.
    put:
      tags:
        - Books
      summary: Update a book
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewBook"
      responses:
        "200":
          description: Book updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Book"
        "404":
          description: Book not found.
    delete:
      tags:
        - Books
      summary: Delete a book
      responses:
        "204":
          description: Book deleted.
        "404":
          description: Book not found.

components:
  schemas:
    Book:
      type: object
      required:
        - id
        - title
        - author
        - publishedYear
      properties:
        id:
          type: string
          example: "1"
        title:
          type: string
          example: "Clean Code"
        author:
          type: string
          example: "Robert C. Martin"
        publishedYear:
          type: integer
          example: 2008
        genre:
          type: string
          example: "Software Engineering"
    NewBook:
      type: object
      required:
        - title
        - author
        - publishedYear
      properties:
        title:
          type: string
          example: "Clean Code"
        author:
          type: string
          example: "Robert C. Martin"
        publishedYear:
          type: integer
          example: 2008
        genre:
          type: string
          example: "Software Engineering"
  parameters:
    BookId:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: The unique identifier of the book
